name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -p -y build-essential git python3-pip zip unzip openjdk-17-jdk libffi-dev libssl-dev
        pip3 install --upgrade buildozer Cython==0.29.33 kivy
    - name: Build with Buildozer
      run: buildozer android debug
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: GooglePlayUpdate
        path: bin/*.apk
        
